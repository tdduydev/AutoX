name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  publish:
    name: Bump Version & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Bump version in all packages
        id: bump
        run: |
          BUMP_TYPE="${{ github.event.inputs.bump }}"

          # Read current root version
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"

          # Bump root version (no git tag yet)
          npm version "$BUMP_TYPE" --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          # List of public packages to bump & publish
          PACKAGES=(
            "packages/shared"
            "packages/core"
            "packages/skills"
            "packages/gateway"
            "packages/cli"
          )

          # Bump version in each public package
          for pkg in "${PACKAGES[@]}"; do
            echo "Bumping $pkg to $NEW_VERSION"
            cd "$pkg"
            npm version "$NEW_VERSION" --no-git-tag-version
            cd "$GITHUB_WORKSPACE"
          done

          # Also update internal dependency references
          for pkg in "${PACKAGES[@]}"; do
            PKG_JSON="$pkg/package.json"
            # Update @xclaw/* dependency versions to ^NEW_VERSION
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$PKG_JSON', 'utf8'));
              for (const depType of ['dependencies', 'devDependencies', 'peerDependencies']) {
                if (!pkg[depType]) continue;
                for (const [name, ver] of Object.entries(pkg[depType])) {
                  if (name.startsWith('@xclaw/') && ver !== '*') {
                    pkg[depType][name] = '^$NEW_VERSION';
                  }
                }
              }
              fs.writeFileSync('$PKG_JSON', JSON.stringify(pkg, null, 4) + '\n');
            "
          done

      - name: Sync docs API files
        run: node scripts/sync-versions.mjs

      - name: Update CHANGELOG.md
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          TODAY=$(date +%Y-%m-%d)

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"%s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"%s" --no-merges -20)
          fi

          # Categorize commits into sections
          ADDED=""
          CHANGED=""
          FIXED=""
          OTHER=""

          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            case "$msg" in
              feat:*|feat\(*|add:*|Add*) ADDED="${ADDED}\n- ${msg#*: }" ;;
              fix:*|fix\(*|bugfix:*) FIXED="${FIXED}\n- ${msg#*: }" ;;
              refactor:*|chore:*|style:*|perf:*|change:*) CHANGED="${CHANGED}\n- ${msg#*: }" ;;
              release:*) ;; # skip release commits
              *) OTHER="${OTHER}\n- ${msg}" ;;
            esac
          done <<< "$COMMITS"

          # Build new entry
          ENTRY="## [${NEW_VERSION}] - ${TODAY}\n"

          if [ -n "$ADDED" ]; then
            ENTRY="${ENTRY}\n### Added\n${ADDED}\n"
          fi
          if [ -n "$CHANGED" ]; then
            ENTRY="${ENTRY}\n### Changed\n${CHANGED}\n"
          fi
          if [ -n "$FIXED" ]; then
            ENTRY="${ENTRY}\n### Fixed\n${FIXED}\n"
          fi
          if [ -n "$OTHER" ]; then
            ENTRY="${ENTRY}\n### Other\n${OTHER}\n"
          fi

          # If no categorized commits, add a generic entry
          if [ -z "$ADDED" ] && [ -z "$CHANGED" ] && [ -z "$FIXED" ] && [ -z "$OTHER" ]; then
            ENTRY="${ENTRY}\n### Changed\n\n- Version bump to ${NEW_VERSION}\n"
          fi

          # Add link reference
          LINK="[${NEW_VERSION}]: https://github.com/tdduydev/xClaw/releases/tag/v${NEW_VERSION}"

          # Prepend new entry after the header in CHANGELOG.md
          node -e "
            const fs = require('fs');
            let changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const marker = '## [';
            const idx = changelog.indexOf(marker);
            if (idx !== -1) {
              const before = changelog.substring(0, idx);
              const after = changelog.substring(idx);
              changelog = before + '$(echo -e "$ENTRY")' + '\n' + after;
            }
            // Add link reference before existing links
            const linkMarker = changelog.lastIndexOf('[');
            const lastNewline = changelog.lastIndexOf('\n', linkMarker);
            changelog = changelog.substring(0, lastNewline + 1) + '${LINK}\n' + changelog.substring(lastNewline + 1);
            fs.writeFileSync('CHANGELOG.md', changelog);
          "

          # Copy to docs
          cp CHANGELOG.md docs/changelog.md

      - name: Build all packages
        run: npm run build

      - name: Publish packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGES=(
            "packages/shared"
            "packages/core"
            "packages/skills"
            "packages/gateway"
            "packages/cli"
          )

          for pkg in "${PACKAGES[@]}"; do
            echo "Publishing $pkg..."
            cd "$pkg"
            npm publish --access public || echo "⚠️  Failed to publish $pkg (may already exist)"
            cd "$GITHUB_WORKSPACE"
          done

      - name: Commit & Tag
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          git add -A
          git commit -m "release: v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin main --tags

      - name: Generate Release Notes
        id: changelog
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD~1" --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi

          PACKAGES=(
            "@xclaw/shared"
            "@xclaw/core"
            "@xclaw/skills"
            "@xclaw/gateway"
            "@xclaw/cli"
          )

          PKG_LIST=""
          for pkg in "${PACKAGES[@]}"; do
            PKG_LIST="${PKG_LIST}- \`${pkg}@${NEW_VERSION}\`\n"
          done

          {
            echo "notes<<EOF"
            echo "## 📦 Published Packages"
            echo ""
            echo -e "$PKG_LIST"
            echo ""
            echo "## 📝 Changes"
            echo ""
            if [ -n "$COMMITS" ]; then
              echo "$COMMITS"
            else
              echo "- Initial release"
            fi
            echo ""
            echo "## 🚀 Install / Update"
            echo ""
            echo "\`\`\`bash"
            echo "npm install @xclaw/core@${NEW_VERSION}"
            echo "# or update all"
            echo "npx xclaw update"
            echo "\`\`\`"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: v${{ steps.bump.outputs.new_version }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
